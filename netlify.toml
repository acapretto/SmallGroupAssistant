[build]
command = "cd frontend && npm run build"
publish = "frontend/dist"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[context.production]
command = "cd frontend && npm run build"
publish = "frontend/dist"

[context.deploy-preview]
command = "cd frontend && npm run build"
publish = "frontend/dist"
